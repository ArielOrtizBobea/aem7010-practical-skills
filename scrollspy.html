<script>
// Sidebar scrollspy: highlight the sidebar link matching the section
// currently in view as the user scrolls.
(function() {
  function currentPagePath() {
    // Normalize the current page path so we can match sidebar links that
    // may use either absolute or relative hrefs.
    return window.location.pathname.split('/').pop() || 'index.html';
  }

  function sidebarAnchorLinks() {
    const page = currentPagePath();
    const links = Array.from(document.querySelectorAll('#quarto-sidebar a'));
    return links.filter(a => {
      if (!a.hash) return false;
      const linkPage = a.pathname.split('/').pop() || 'index.html';
      return linkPage === page || linkPage.replace('.qmd', '.html') === page;
    });
  }

  function init() {
    const links = sidebarAnchorLinks();
    if (links.length === 0) return;

    // Map heading id -> sidebar link
    const map = {};
    const headings = [];
    links.forEach(link => {
      const id = decodeURIComponent(link.hash.substring(1));
      const el = document.getElementById(id);
      if (el) {
        map[id] = link;
        headings.push({ id: id, el: el });
      }
    });
    if (headings.length === 0) return;

    let currentId = null;

    function update() {
      const scrollY = window.scrollY + 120; // offset from top for fixed headers
      let activeId = null;
      for (let i = 0; i < headings.length; i++) {
        const top = headings[i].el.getBoundingClientRect().top + window.scrollY;
        if (top <= scrollY) {
          activeId = headings[i].id;
        } else {
          break;
        }
      }
      if (activeId !== currentId) {
        if (currentId && map[currentId]) {
          map[currentId].classList.remove('active', 'scrollspy-current');
        }
        if (activeId && map[activeId]) {
          map[activeId].classList.add('active', 'scrollspy-current');
        }
        currentId = activeId;
      }
    }

    let ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        window.requestAnimationFrame(function() {
          update();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    update();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
